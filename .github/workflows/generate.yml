name: Generate release versions
on:
  workflow_dispatch:
  schedule:
    - cron: '30 11 * * *'
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6.3.0
        with:
          git_user_signingkey: true
          git_commit_gpgsign: true
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - run: |
            git config --global user.email 181243999+tna-da-bot@users.noreply.github.com
            git config --global user.name tna-da-bot
            cd release-versions
            pip install -r requirements.txt
            python generate_release_file.py transfer-digital-records
            cd ..
        env:
          GITHUB_API_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          SLACK_URL: ${{ secrets.SLACK_WEBHOOK }}
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: scripts-pages
          token: ${{ secrets.WORKFLOW_PAT }}
          path: scripts-pages
      - run: |
            cd scripts-pages 
            mkdir -p docs/transfer-digital-records
            cp ../release-versions/transfer-digital-records/output.html docs/transfer-digital-records/
            git add docs
            git commit -m "Add release versions" || true
            git push
